<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0e1621" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="NNoMes — Serverless peer-to-peer file transfer over LAN. No servers, no clouds, no signups." />
  
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="manifest" href="./manifest.json" />
  
  <title>NNoMes — P2P File Transfer</title>
  
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0e1621; }
    #app { height: 100%; }
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0e1621;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .splash-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3390ec, #2b5278);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .splash-title { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
    .splash-subtitle { font-size: 14px; color: #8e9ba6; margin: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div class="splash" id="splash">
      <div class="splash-logo">N</div>
      <h1 class="splash-title">NNoMes</h1>
      <p class="splash-subtitle">Serverless P2P file transfer</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
